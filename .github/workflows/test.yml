name: "Test"

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: "windows-latest"
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: "10.0.x"

      - name: Run tests
        run: dotnet test Guard.Test

      - name: Build CLI
        run: dotnet build Guard.CLI --configuration Release

      - name: Build WPF
        run: dotnet build Guard.WPF --configuration Release
